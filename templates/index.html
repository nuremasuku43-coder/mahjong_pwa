<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>麻雀スコア集計</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="manifest" href="static/manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <link rel="icon" href="static/icons/icon-192.png">

    <link rel="stylesheet" href="static/style.css">

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("static/service-worker.js");
      }
    </script>
</head>
<body>
<div class="container">
    <h1>麻雀スコア集計</h1>

    <section class="card">
        <h2>半荘入力</h2>
        <form id="hanchan-form" class="form-grid">
            <div class="row">
                <input name="player" placeholder="プレイヤー名" required>
                <input name="score" placeholder="最終持ち点" type="number" required>
            </div>
            <div class="row">
                <input name="player" placeholder="プレイヤー名" required>
                <input name="score" placeholder="最終持ち点" type="number" required>
            </div>
            <div class="row">
                <input name="player" placeholder="プレイヤー名" required>
                <input name="score" placeholder="最終持ち点" type="number" required>
            </div>
            <div class="row">
                <input name="player" placeholder="プレイヤー名" required>
                <input name="score" placeholder="最終持ち点" type="number" required>
            </div>

            <button type="submit" class="btn-primary">この半荘を登録</button>
        </form>
    </section>

    <section class="card">
        <h2>トータル成績</h2>
        <div id="total-table-area">
            <p>まだ対局が登録されていません。</p>
        </div>
    </section>

    <section class="card">
        <h2>半荘履歴</h2>
        <div id="history-area">
            <p>履歴はまだありません。</p>
        </div>
    </section>
</div>

<script src="static/app.js"></script>
</body>
</html>
